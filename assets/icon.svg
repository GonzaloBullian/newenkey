<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c1524"/>
      <stop offset="50%" stop-color="#152238"/>
      <stop offset="100%" stop-color="#0c1524"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="40%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="glow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0891b2" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="border-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="50%" stop-color="#22d3ee" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1e3a5f"/>
    </linearGradient>
    <filter id="glow-filter" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg)" stroke="url(#border-grad)" stroke-width="2"/>

  <!-- Subtle top highlight -->
  <rect x="18" y="18" width="476" height="240" rx="94" ry="94" fill="url(#glow)" opacity="0.2"/>

  <!-- Andean stepped pattern (chakana-inspired border decoration) -->
  <g opacity="0.06" stroke="#22d3ee" stroke-width="1.5" fill="none">
    <!-- Top-left stepped corner -->
    <polyline points="80,140 80,100 100,100 100,80 140,80"/>
    <polyline points="90,130 90,110 110,110 110,90 130,90"/>
    <!-- Top-right stepped corner -->
    <polyline points="432,140 432,100 412,100 412,80 372,80"/>
    <polyline points="422,130 422,110 402,110 402,90 382,90"/>
    <!-- Bottom-left stepped corner -->
    <polyline points="80,372 80,412 100,412 100,432 140,432"/>
    <polyline points="90,382 90,402 110,402 110,422 130,422"/>
    <!-- Bottom-right stepped corner -->
    <polyline points="432,372 432,412 412,412 412,432 372,432"/>
    <polyline points="422,382 422,402 402,402 402,422 382,422"/>
  </g>

  <!-- Subtle diamond/rhombus grid (textile-inspired) -->
  <g opacity="0.035" stroke="#67e8f9" stroke-width="1" fill="none">
    <rect x="206" y="100" width="100" height="100" rx="0" transform="rotate(45 256 150)"/>
    <rect x="206" y="310" width="100" height="100" rx="0" transform="rotate(45 256 360)"/>
  </g>

  <!-- Center glow -->
  <ellipse cx="256" cy="256" rx="90" ry="110" fill="#22d3ee" opacity="0.08" filter="url(#glow-filter)"/>

  <!-- Main lightning bolt (Newen = force/energy) -->
  <g filter="url(#glow-filter)">
    <path d="
      M 282 88
      L 192 252
      L 246 252
      L 226 424
      L 320 236
      L 266 236
      Z
    " fill="url(#bolt)" stroke="#a5f3fc" stroke-width="1.5" stroke-linejoin="round" opacity="0.95"/>
  </g>

  <!-- Bolt shine -->
  <path d="
    M 278 98
    L 204 240
    L 248 240
    L 254 216
    L 278 148
    Z
  " fill="#a5f3fc" opacity="0.2"/>

  <!-- Small chakana (Andean cross) accent marks -->
  <g opacity="0.4" fill="#22d3ee">
    <!-- Top-left small cross -->
    <rect x="148" y="170" width="4" height="4"/>
    <rect x="144" y="174" width="4" height="4"/>
    <rect x="152" y="174" width="4" height="4"/>
    <rect x="148" y="178" width="4" height="4"/>

    <!-- Bottom-right small cross -->
    <rect x="352" y="328" width="4" height="4"/>
    <rect x="348" y="332" width="4" height="4"/>
    <rect x="356" y="332" width="4" height="4"/>
    <rect x="352" y="336" width="4" height="4"/>

    <!-- Mid-left dot cluster -->
    <circle cx="158" cy="300" r="2"/>
    <circle cx="166" cy="296" r="1.5"/>

    <!-- Mid-right dot cluster -->
    <circle cx="354" cy="208" r="2"/>
    <circle cx="346" cy="212" r="1.5"/>
  </g>
</svg>
